<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALENTO Y COLOR | DTF BOGOTA</title>
    <meta name="description"
        content="DTF Bogotá by Talento y Color — Apliques DTF por metros, la mejor calidad en Bogotá.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>DTF BOGOTA</h1>
        <p class="anuncio">BY TALENTO Y COLOR</p>

        <div class="links-container">
            <a href="https://wa.me/573202970933" class="boton-link boton-wp" onclick="registrarClic('T&C DTF')"><i
                    class="fa-brands fa-whatsapp"></i>Quiero hacer apliques...</a>
        </div>

        <div class="social-media">
            <a href="https://instagram.com/talentoycolor" target="_blank" class="social-icon"
                onclick="registrarClic('Instagram DTF')">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.tiktok.com/@dtfbogotaxmetros" target="_blank" class="social-icon"
                onclick="registrarClic('TikTok DTF')">
                <i class="fa-brands fa-tiktok"></i>
            </a>
        </div>
    </div>

    <script>
        const API_URL = "https://api-login.andres-electronica2.workers.dev";

        function registrarClic(nombreBoton) {
            // keepalive: true asegura que la petición llegue al servidor aunque el cliente cambie de página instantáneamente
            fetch(API_URL + "/registrar-clic", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ boton: nombreBoton }),
                keepalive: true
            }).catch(error => console.error("Error al registrar métrica:", error));
        }
    </script>
</body>

</html>
