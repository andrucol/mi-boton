<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperio Studio | Vive la experencia imperial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --oro-rosa: linear-gradient(45deg, #b76e79, #dfa3ab, #eec0c8);
            --rosa-pastel: #fff5f7;
            --texto-oscuro: #5d4037;
            --sombra-oro: rgba(183, 110, 121, 0.3);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--rosa-pastel);
            background-image: radial-gradient(#fce4ec 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--texto-oscuro);
        }

        .container {
            background: white;
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px var(--sombra-oro);
            border: 1px solid white;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 0;
            background: var(--oro-rosa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            font-weight: 800;
        }

        .anuncio {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 2.5rem;
            color: #b76e79;
            font-weight: 400;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 2rem;
        }

        .whatsapp-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .boton-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            color: #b76e79;
            padding: 14px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            border-radius: 15px;
            border: 2px solid #f8bbd0;
            transition: all 0.3s ease;
        }

        .boton-wp {
            padding: 10px 5px;
            font-size: 14px;
        }

        .boton-link:hover {
            background: var(--oro-rosa);
            color: white;
            border-color: transparent;
            transform: scale(1.02);
        }

        .social-media {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .social-icon {
            font-size: 24px;
            color: #b76e79;
            transition: transform 0.3s ease, color 0.3s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            color: #dfa3ab;
            transform: translateY(-5px);
        }

        i { width: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>IMPERIO STUDIO</h1>
        <p class="anuncio">Vive la experiencia imperial</p>
        
        <div class="links-container">
            <a href="https://script.google.com/macros/s/AKfycbx2x0pKe6bS2rYDOTG1PwiLdENvQrHgTOV4A8Ox8C7rs1C3Z17576r7xnZBSicLX9GR/exec" class="boton-link" onclick="registrarClic('Agenda Online')">
                <i class="fa-solid fa-calendar-check"></i> Agenda Online
            </a>

            <div class="whatsapp-grid">
                <a href="https://wa.me/573132296331" class="boton-link boton-wp" onclick="registrarClic('WA Restrepo')"><i class="fa-brands fa-whatsapp"></i> Restrepo</a>
                <a href="https://wa.me/573108026731" class="boton-link boton-wp" onclick="registrarClic('WA Kennedy')"><i class="fa-brands fa-whatsapp"></i> Kennedy</a>
                <a href="https://wa.me/573106684514" class="boton-link boton-wp" onclick="registrarClic('WA Engativa')"><i class="fa-brands fa-whatsapp"></i> Engativá</a>
                <a href="https://wa.me/573132803075" class="boton-link boton-wp" onclick="registrarClic('WA Teusaquillo')"><i class="fa-brands fa-whatsapp"></i> Teusaquillo</a>
                <a href="https://wa.me/573134879119" class="boton-link boton-wp" onclick="registrarClic('WA Modelia')"><i class="fa-brands fa-whatsapp"></i> Modelia</a>
                <a href="https://wa.me/573106702672" class="boton-link boton-wp" onclick="registrarClic('WA Suba')"><i class="fa-brands fa-whatsapp"></i> Suba</a>
                <a href="https://wa.me/573107961512" class="boton-link boton-wp" style="grid-column: span 2;" onclick="registrarClic('WA Soacha')"><i class="fa-brands fa-whatsapp"></i> Soacha</a>
            </div>
        </div>

        <div class="social-media">
            <a href="https://instagram.com/elimperiodelasunas_" target="_blank" class="social-icon" onclick="registrarClic('Instagram')">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.facebook.com/elimperiodelasunas" target="_blank" class="social-icon" onclick="registrarClic('Facebook')">
                <i class="fa-brands fa-facebook"></i>
            </a>
            <a href="https://www.tiktok.com/@elimperiodelasunas_" target="_blank" class="social-icon" onclick="registrarClic('TikTok')">
                <i class="fa-brands fa-tiktok"></i>
            </a>
        </div>
    </div>

    <script>
        const API_URL = "https://api-login.andres-electronica2.workers.dev";

        function registrarClic(nombreBoton) {
            // keepalive: true asegura que la petición llegue al servidor aunque el cliente cambie de página instantáneamente
            fetch(API_URL + "/registrar-clic", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ boton: nombreBoton }),
                keepalive: true 
            }).catch(error => console.error("Error al registrar métrica:", error));
        }
    </script>
</body>
</html>
